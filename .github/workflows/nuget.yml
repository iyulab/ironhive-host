name: NuGet

on:
  push:
    branches: [main]
    paths:
      - 'Directory.Build.props'
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: 'Skip CI check (for manual releases)'
        required: false
        default: true
        type: boolean

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Wait for CI to pass first (skipped for manual workflow_dispatch)
  ci-check:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_ci_check != true }}
    steps:
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'build (ubuntu-latest)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # Extract version from Directory.Build.props
  version:
    needs: ci-check
    if: ${{ always() && (needs.ci-check.result == 'success' || needs.ci-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Directory.Build.props
        id: get-version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

  # Build and publish to NuGet
  publish:
    needs: version
    if: ${{ always() && needs.version.result == 'success' && needs.version.outputs.version != '' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check if package version exists on NuGet
        id: check-nuget
        run: |
          VERSION=${{ needs.version.outputs.version }}
          PACKAGE_ID="IronHive.Cli"

          # Check if version exists on NuGet
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID,,}/${VERSION}/${PACKAGE_ID,,}.${VERSION}.nupkg")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Package $PACKAGE_ID version $VERSION already exists on NuGet"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Package $PACKAGE_ID version $VERSION does not exist on NuGet"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        if: steps.check-nuget.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        if: steps.check-nuget.outputs.exists == 'false'
        run: dotnet restore

      - name: Build
        if: steps.check-nuget.outputs.exists == 'false'
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        if: steps.check-nuget.outputs.exists == 'false'
        run: dotnet pack src/IronHive.Cli/IronHive.Cli.csproj --no-build --configuration Release --output ./nupkg

      - name: List packages
        if: steps.check-nuget.outputs.exists == 'false'
        run: ls -la ./nupkg/

      - name: Push to NuGet
        if: steps.check-nuget.outputs.exists == 'false'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Skip message
        if: steps.check-nuget.outputs.exists == 'true'
        run: |
          echo "Package IronHive.Cli version ${{ needs.version.outputs.version }} already exists on NuGet. Skipping publish."
