name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Directory.Build.props'
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: 'Skip CI check (for manual releases)'
        required: false
        default: 'true'
        type: boolean

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  RELEASE_REPO: iyulab/ironhive-cli-releases

jobs:
  # Wait for CI to pass first (skipped for manual workflow_dispatch)
  ci-check:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_ci_check != true }}
    steps:
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'build (ubuntu-latest)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # Extract version from Directory.Build.props
  version:
    needs: ci-check
    if: ${{ always() && (needs.ci-check.result == 'success' || needs.ci-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
      release-exists: ${{ steps.check-release.outputs.exists }}
      nuget-exists: ${{ steps.check-nuget.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Directory.Build.props
        id: get-version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if prerelease (contains alpha, beta, rc, preview)
          if [[ "$VERSION" =~ (alpha|beta|rc|preview) ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "Detected version: $VERSION"

      - name: Check if GitHub release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          if gh release view "v$VERSION" --repo ${{ env.RELEASE_REPO }} &>/dev/null; then
            echo "Release v$VERSION already exists in ${{ env.RELEASE_REPO }}"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release v$VERSION does not exist in ${{ env.RELEASE_REPO }}"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if NuGet package already exists
        id: check-nuget
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          PACKAGE_ID="IronHive.Cli"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID,,}/${VERSION}/${PACKAGE_ID,,}.${VERSION}.nupkg")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Package $PACKAGE_ID version $VERSION already exists on NuGet"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Package $PACKAGE_ID version $VERSION does not exist on NuGet"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # Build and create GitHub Release
  release:
    needs: version
    if: ${{ always() && needs.version.result == 'success' && needs.version.outputs.release-exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build for Windows x64
        run: |
          dotnet publish src/IronHive.Cli -c Release -r win-x64 \
            -o ./publish/win-x64

      - name: Build for Linux x64
        run: |
          dotnet publish src/IronHive.Cli -c Release -r linux-x64 \
            -o ./publish/linux-x64

      - name: Build for macOS x64
        run: |
          dotnet publish src/IronHive.Cli -c Release -r osx-x64 \
            -o ./publish/osx-x64

      - name: Build for macOS ARM64
        run: |
          dotnet publish src/IronHive.Cli -c Release -r osx-arm64 \
            -o ./publish/osx-arm64

      - name: Create archives
        run: |
          VERSION=${{ needs.version.outputs.version }}

          # Windows - zip without parent folder
          cd publish/win-x64
          zip -r ../../ironhive-${VERSION}-win-x64.zip .
          cd ../..

          # Linux/macOS - tar without parent folder
          tar -czvf ironhive-${VERSION}-linux-x64.tar.gz -C publish/linux-x64 .
          tar -czvf ironhive-${VERSION}-osx-x64.tar.gz -C publish/osx-x64 .
          tar -czvf ironhive-${VERSION}-osx-arm64.tar.gz -C publish/osx-arm64 .

      - name: Generate checksums
        run: |
          sha256sum ironhive-*.zip ironhive-*.tar.gz > checksums.sha256

      - name: Create tag in source repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.version.outputs.version }}

          # Check if tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists in source repo, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "Created tag v$VERSION in source repo"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=${{ needs.version.outputs.version }}
          IS_PRERELEASE=${{ needs.version.outputs.is-prerelease }}

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "v$VERSION" \
            --repo ${{ env.RELEASE_REPO }} \
            --title "IronHive CLI v$VERSION" \
            --notes "## IronHive CLI v$VERSION

          ### Installation

          **Via dotnet tool (Recommended)**
          \`\`\`bash
          dotnet tool install -g IronHive.Cli
          \`\`\`

          **Windows (x64)**
          \`\`\`powershell
          Invoke-WebRequest -Uri \"https://github.com/${{ env.RELEASE_REPO }}/releases/download/v$VERSION/ironhive-$VERSION-win-x64.zip\" -OutFile ironhive.zip
          Expand-Archive ironhive.zip -DestinationPath .
          \`\`\`

          **Linux (x64)**
          \`\`\`bash
          curl -LO https://github.com/${{ env.RELEASE_REPO }}/releases/download/v$VERSION/ironhive-$VERSION-linux-x64.tar.gz
          tar -xzf ironhive-$VERSION-linux-x64.tar.gz
          chmod +x ironhive
          \`\`\`

          **macOS (Intel)**
          \`\`\`bash
          curl -LO https://github.com/${{ env.RELEASE_REPO }}/releases/download/v$VERSION/ironhive-$VERSION-osx-x64.tar.gz
          tar -xzf ironhive-$VERSION-osx-x64.tar.gz
          chmod +x ironhive
          \`\`\`

          **macOS (Apple Silicon)**
          \`\`\`bash
          curl -LO https://github.com/${{ env.RELEASE_REPO }}/releases/download/v$VERSION/ironhive-$VERSION-osx-arm64.tar.gz
          tar -xzf ironhive-$VERSION-osx-arm64.tar.gz
          chmod +x ironhive
          \`\`\`

          ### Update
          \`\`\`bash
          dotnet tool update -g IronHive.Cli
          \`\`\`
          " \
            $PRERELEASE_FLAG \
            ironhive-*.zip \
            ironhive-*.tar.gz \
            checksums.sha256

  # Publish to NuGet (runs after release)
  nuget:
    needs: [version, release]
    if: ${{ always() && needs.version.outputs.nuget-exists != 'true' && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack
        run: dotnet pack src/IronHive.Cli/IronHive.Cli.csproj --configuration Release --output ./nupkg

      - name: List packages
        run: ls -la ./nupkg/

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # Summary
  summary:
    needs: [version, release, nuget]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NuGet Publish | ${{ needs.nuget.result }} |" >> $GITHUB_STEP_SUMMARY
